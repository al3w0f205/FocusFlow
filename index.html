<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow | Productivity Tracker</title>
    <meta name="description" content="A premium offline Pomodoro and Task management tool.">
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="app-container">
        
        <!-- Timer Section -->
        <main class="glass-panel timer-section">
            <header class="timer-header">
                <div class="brand">FocusFlow</div>
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="pomodoro">Pomodoro</button>
                    <button class="mode-btn" data-mode="shortBreak">Short Break</button>
                    <button class="mode-btn" data-mode="longBreak">Long Break</button>
                </div>
            </header>

            <div class="timer-display">
                <svg class="progress-ring" width="300" height="300" viewBox="0 0 300 300">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#06B6D4" />
                            <stop offset="100%" stop-color="#8B5CF6" />
                        </linearGradient>
                    </defs>
                    <circle class="progress-ring__circle_bg" cx="150" cy="150" r="135"></circle>
                    <circle class="progress-ring__circle" cx="150" cy="150" r="135"></circle>
                </svg>
                <div class="time" id="time-display">25:00</div>
                <div class="status-text" id="status-display">Focus Session</div>
            </div>

            <div class="controls">
                <button class="btn-primary" id="btn-toggle">Start</button>
                <button class="btn-icon" id="btn-reset">
                    <i data-lucide="rotate-ccw"></i>
                </button>
            </div>
        </main>

        <!-- Tasks Section -->
        <aside class="glass-panel tasks-section">
            <div class="tasks-header">
                <h2>Tasks</h2>
                <p>Prioritize your workflow</p>
            </div>

            <form class="task-input-container" id="task-form">
                <input type="text" id="task-input" class="task-input" placeholder="What are you working on?" autocomplete="off" required>
                <button type="submit" class="btn-add">
                    <i data-lucide="plus"></i>
                </button>
            </form>

            <div class="tasks-list" id="tasks-list">
                <!-- Tasks will be injected here by JS -->
            </div>
        </aside>

    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
